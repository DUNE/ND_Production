SEED: -1
## with lepton, generate 20cm from the wall
## the KE range is ~80% coverage of the LBNF
Generator1:
  NumEvent: [5,15]
  NumParticle: [1,10]
  XRange: [-3700, 3700] #mm
  YRange: [-2368.713, 1031.287] #mm
  ZRange: [3957.559, 9357.559] #mm
  TRange: [0,10000] #ns
  AddParent: True
  Particles:
    -
      PDG:      [11,-11,13,-13]
      NumRange: [1,1]
      KERange:  [0.01,5.] # 3.1 for muons and 7.3 for electrons
      UseMom:   False
      Weight:   1
    -
      PDG:      [211,-211]
      NumRange: [0,2]
      KERange:  [0.01,1.1]
      UseMom:   False
      Weight:   1

    -
      PDG:      [22,111]
      NumRange: [0,2]
      KERange:  [0.01,1.1] # 0.7 for 22, 1.1 for 111
      UseMom:   False
      Weight:   1

    -
      PDG:      [2212]
      NumRange: [0,5]
      KERange:  [0.02,0.2]
      UseMom:   False
      Weight:   1

    -
      PDG:      [2112]
      NumRange: [0,3]
      KERange:  [0.02,0.2]
      UseMom:   False
      Weight:   1

    -
      PDG:      [130, 321, -321, 310]
      NumRange: [0,1]
      KERange:  [0.01,4.]
      UseMom:   False
      Weight:   0.25

    -
      PDG:      [3122]
      NumRange: [0,1]
      KERange:  [0.01,2.1]
      UseMom:   False
      Weight:   0.25

