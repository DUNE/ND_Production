Singles:
  NumEvent: [30,50]
  NumParticle: [1,1]
  XRange: [-3700, 3700] #mm
  YRange: [-2368.713, 1031.287] #mm
  ZRange: [3957.559, 9357.559] #mm
  TRange: [0,10000] #ns
  Particles:
    -
      PDG:  [13, -13]
      NumRange: [0,30]
      KERange:  [0.1,15.0] # 12.6 for muons
      UseMom:   False
      Weight:   1

    -
      PDG:  [-13]
      NumRange: [0,20]
