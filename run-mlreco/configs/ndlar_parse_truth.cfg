# ND-LAr truth parsing

include:
  - infer/nd-lar/base/base_240819.yaml
  - infer/nd-lar/io/io_240819.yaml

# Overrides
override:
  # No GPU
  base.world_size: 0

  # Only build truth objects
  build.mode: truth

  # No reconstructed information to write
  io.writer.keys-: [points, depositions, reco_particles, reco_interactions]
